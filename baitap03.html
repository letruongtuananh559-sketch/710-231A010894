<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Bài tập 3 - Countdown</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        #clock { font-size: 80px; text-align: center; color: #2c3e50; margin: 50px 0; }
        .red { color: red !important; animation: shake 0.5s infinite; }
        @keyframes shake { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
    </style>
</head>
<body>
    <nav><a href="index.html">← Menu</a></nav>
    <main>
        <h2>Countdown Timer (10:00)</h2>
        <div id="clock">10:00</div>
    </main>
    <script>
        let time = 600; // 10 phút tính bằng giây
        const clockDiv = document.getElementById('clock');

        const interval = setInterval(() => {
            let m = Math.floor(time / 60);
            let s = time % 60;
            clockDiv.innerText = `${m < 10 ? '0'+m : m}:${s < 10 ? '0'+s : s}`;
            
            if (time <= 60) clockDiv.classList.add('red');
            if (time <= 0) {
                clearInterval(interval);
                alert("Hết giờ!");
            }
            time--;
        }, 1000);
    </script>
</body>
</html>
